<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup - CareBridge</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">


    <!-- RIGHT SIDE (FORM) -->
    <div class="right">

        <div class="card modern">

            <h1>Profile Setup</h1>
            <p class="subtitle">Personalize your experience</p>

            <!-- Basic Info -->
            <input type="text" placeholder="Full Name">
            <input type="number" placeholder="Age">
            <input type="text" placeholder="Child Age (optional)">

            <!-- Pregnancy Info -->
            <select>
                <option>Are you pregnant?</option>
                <option>Yes</option>
                <option>No</option>
            </select>

            <select>
                <option>Select Trimester</option>
                <option>First Trimester</option>
                <option>Second Trimester</option>
                <option>Third Trimester</option>
            </select>

            <input type="number" placeholder="Weeks Pregnant">
            <input type="date">

            <!-- Button -->
            <button onclick="goToDashboard()">Continue</button>

        </div>

    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
